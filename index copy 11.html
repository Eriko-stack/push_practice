<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>Hello!</title>
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <h1>Hello!</h1>
        <div class="container">
        <p>
            <script>
                let arr = [98, 76, 57, 69, 85];
                let total = 0;
                for (let item of arr) {
                    total += item;//☆total=total+item;
                }
                document.write('合計は、'+total+'平均は、'+total/5+'です。');
            </script>
        </p>
        </div>
    </body>
</html>
