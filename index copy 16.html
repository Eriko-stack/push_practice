<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>Hello!</title>
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <h1>Hello!</h1>
        <div class="container">
        <p onclick="action(event)">click me!</p>
        <script>
        let counter=0;
        function action(event){
            counter++;
            let dom=event.target;
            dom.textContent='Count:'+counter;
        }
            </script>
        
        </div>
    </body>
</html>
