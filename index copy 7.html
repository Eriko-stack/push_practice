<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>Hello!</title>
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <h1>Hello!</h1>
        <div class="container">
        <p>
            <script>
               let N=1103;
               let result=true;
               for(let i=2;i<N; i++) {
                if(N%i==0){
                    result=false;
                    break;
                }
            }
            if (result){
                document.write(N+"は、素数です。");
            } else {
                document.write(N+"は、素数じゃないです。");
            }
            </script>
        </p>
    </body>
</html>
