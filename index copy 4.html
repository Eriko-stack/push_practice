<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>Hello!</title>
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <h1>Hello!</h1>
        <div class="container">
        <p>
            <script>
                let name=12345;
                if(name%2==0){
                    document.write(name + "は、偶数です。<br>");
                } else {
                    document.write(name + "は、奇数です。<br>");
                }
            </script>
        </p>
        </div>
    </body>
</html>
