<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <title>Hello!</title>
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <h1>Hello!</h1>
        <div class="container">
        <p>
            <script>
                let jikan=12;//☆
                let result=Math.floor(jikan/6);
                switch(result){
                 case 0:
                    document.write('おやすみなさい。'+jikan+'時は、深夜です。');
                    break;
                 case 1:
                    document.write('おはよう。'+jikan+'時は、朝です。');
                    break;
                 case 2:
                    document.write('こんにちは。'+jikan+'時は、昼です。');
                    break;
                 case 3:
                    document.write('こんばんは'+jikan+'時は、夜です。');
                    break;
                }
            </script>
        </p>
        </div>
    </body>
</html>
