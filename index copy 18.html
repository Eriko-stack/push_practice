<!DOCTYPE html>
<html lang="ja">
    <head>

        <title>Hello!</title>
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <h1>Hello!</h1>
        <div class="container">
        <p>
            <script>
            function hello(name){

            hello("Hanako");
            hello("Sachiko");
            </script>
        </p>
        </div>
    </body>
